text: "Garland is phenomenal as a teacher, a yogi, and as a studio owner. Everyone is welcome at KHY — so many people from every culture, body type, age, and background, all welcomed with sincerity. Not to mention she is an incredible yoga teacher. We miss her in Richmond and you guys are so lucky to have her."
