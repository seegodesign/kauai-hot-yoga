text: "What a wonderful establishment. The studio is clean, Marvin the instructor was informative and one of the better yoga instructors I have experienced. The yoga clothing in the boutique, which I haven't seen sold anywhere else, is very fun. Strongly recommend practicing here — it was a great experience all around."
