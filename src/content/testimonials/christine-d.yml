name: Christine D.
location: Oakland, CA
rating: 5
text: "I went to this studio for two weeks on a traveler's pass while visiting the island. It's welcoming — people of all ages and body shapes attend the classes. On my last day, I brought my 64-year-old mom. She was happy she wasn't the only person her age in class. You'll definitely sweat, but it feels great when you walk out."
highlight: Welcoming to all ages
source: Yelp
order: 5
