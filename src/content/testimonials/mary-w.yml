name: Mary W.
location: Oakland, CA
rating: 5
text: "Great yoga studio! I was on vacation and went three times on their traveler's pass. The instructors were very knowledgeable and professional — I did both Bikram and Vinyasa. Both classes had music which really kept you going. Both instructors were encouraging. All in all a sweet part of my vacation!"
highlight: Sweet part of my vacation
source: Yelp
order: 8
