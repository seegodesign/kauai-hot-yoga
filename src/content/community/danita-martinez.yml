name: Danita Martinez
role: Hot Yogi & Herbalist
bio: "Hot yoga found me in 2018 when I walked into the yoga garage to sweat — and I was completely hooked. The practice became my church and ceremony, engaging the Ayurvedic principles I adore. Through commitment to 26/2, Hot Vinyasa, and Hot Yoga Sculpt, I transformed my body and life. In 2022 I earned my 300-hour Hot Yoga teacher certification in Mexico. I am also the founder of Crow Star Woman Botanical Studio LLC — herbal alchemy for the skin, soul, and senses, rooted in Indigenous plant medicine."
