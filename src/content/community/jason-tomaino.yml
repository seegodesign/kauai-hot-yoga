name: Jason Tomaino
role: Holistic Health Practitioner
bio: Jason is a master bodyworker and educator with 15+ years of experience in Thai Medical Massage and Mana Lomi. Having taught at institutions like PCOM and IPSB, he brings a deep understanding of orthopedic acupressure and energetic flow to his practice. Through intentional movement and deep tissue work, Jason clears bodily stagnation and restores Prana to help clients overcome chronic pain and stress.
