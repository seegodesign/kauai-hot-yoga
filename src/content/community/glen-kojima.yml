name: Glen Kojima
role: Real Estate Agent & Yoga Enthusiast
bio: Born and raised on Kauai, Glen earned his MBA from the University of Washington in 1987 before returning home to serve his community in real estate with the Kauai Realty Team. He has practiced yoga for over 13 years, developing his own philosophy he calls the "IN" theory — practicing with INtention, INtegrity, and withIN each posture, staying fully present. That same mindset guides his work in real estate, where he approaches every transaction with mindfulness and authentic connection.
