name: Rob Geist
role: Physical Therapist & Yoga Student
bio: "Like many, I came to yoga skeptical — I spent most of my time rock climbing or in the gym. But yoga changed everything. After years of personal hardship and grief, I threw myself into practice. A friend and teacher encouraged me to take YTT, and I graduated in spring 2025. Yoga opened so many doors for healing and gave me a safe place to grieve. The community, my practice, and the four corners of my mat are sacred to me. Turning trauma into beauty — little win after little win."
