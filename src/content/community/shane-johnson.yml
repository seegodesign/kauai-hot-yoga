name: Shane Johnson
role: Sacred Temple Lomi Practitioner & Teacher
bio: Shane Johnson is the founder of Sacred Temple Lomi and a Temple-Style Lomi practitioner and teacher based on Kauai. With more than 30 years of dedicated practice, he carries forward the lineage of traditional Hawaiian Lomi Lomi as taught to him by his kumu and elders. His work integrates flowing forearm techniques, breath, prayer, and sacred intention to support deep physical, emotional, and energetic release. Sessions are offered as ceremonial healing experiences honoring the spiritual roots of Lomi. Contact Shane at 808-755-5039 to book your session.
