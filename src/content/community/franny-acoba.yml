name: Franny Acoba
role: Long-Time KHY Student
bio: Kauai Hot Yoga came into my life seven years ago — I watched this beautiful young lady creating a special place for us to come together. My salon was right across from the studio, and though I had never practiced hot yoga, yoga itself had been part of my life since I was a teenager. I decided to give it a couple of months. After just a few weeks, I was hooked. What this practice brings to me is not only physical benefits, but also mental health, strength, purpose, support, comfort, no judgment, family (ohana), and love.
