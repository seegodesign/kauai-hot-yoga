name: Cameron Gaut
role: Musician & Web Developer
bio: Cameron has been sharing the healing sounds of the flute for over a decade. A frequent collaborator at KHY, he combines ambient music and bansuri flute with breathwork and cold plunge sessions to help students connect more deeply with themselves. His music is a blend of traditional Indian melodies and modern ambient textures, creating a unique soundscape that promotes relaxation and inner peace. When he's not performing or recording, Cameron is building websites like this one and enjoying raising two kids in natural beauty of Kauai.
