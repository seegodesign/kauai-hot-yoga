category: Class Information
question: "What's the difference between the class types?"
answer: "Hot 26 & 2 is a structured Bikram-style sequence. Vinyasa is a dynamic  practice, connecting movement with breath and flowing from one posture to the other. Yin and restorative are non-heated, slow paced classes with long holds that incorporate sound bath, Reiki, 9D Breathwork and myofacial release. Sculpt and Pilates are more fitness style classes, using weights and resistance bands."
order: 1
