name: Erica Rideau
title: Instructor
bio: "Erica has been teaching yoga since 2011. Her first training was in Ashtanga Vinyasa as taught by Sri K. Pattabi Jois. She went on to teach for two non-profit organizations — The Art of Yoga Project and Niroga — bringing yoga to underserved teenagers and incarcerated youth in the San Francisco Bay Area. That work shaped her voice and purpose as a teacher. Now on Kauai for several years, Erica teaches classes that are holistic and wholesome, placing deep emphasis on the breath and connection to the body. Her guiding principle: 'Every breath counts. Every breath matters.'"
