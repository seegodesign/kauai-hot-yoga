name: Pamela Salibi
title: Instructor
bio: Pamela has practiced many styles and teachings throughout her adult life, beginning with Baptiste Yoga in 2011 before earning her 200-hour teaching certification through the Baptiste Institute. She has also studied Vinyasa, Hatha, Chair Yoga, and is certified in Yin and Restorative. Her teaching style is positive, upbeat, and fun — with a main goal of inspiring people of all ages, shapes, sizes, and walks of life to experience the many joys and benefits of a devoted yoga practice.
