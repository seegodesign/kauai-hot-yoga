name: Garland Hume
title: Owner & Lead Instructor
bio: Garland began his yoga journey in January 2007 and completed the 9-week Bikram Yoga Teacher Training in Waikiki in the fall of 2007. In 2010 he became co-owner of two Bikram Yoga studios in Richmond, VA, before moving to Kauai in 2017 and opening Kauai Hot Yoga. Garland competed in yoga from 2009–2020 and served as Board President of USA Yoga, the national sporting organization, from 2017–2020. He has since expanded his teaching to Inferno Hot Pilates, Yin Yoga, Restorative Yoga, Vinyasa Yoga, Sound Bath, and Reiki. His mission is for every student to leave feeling like they had one of the best yoga experiences of their life.
