name: Nyisha Rylander
title: Instructor & Health Coach
bio: Yoga has been part of Nyisha's life for nearly three decades. What began as a way to heal after a car accident has grown into a lifelong practice and career that continues to inspire her. An RYT-500, she has studied with Leslie Perlman, Jason Crandell, and Sage Rountree. Her teaching style blends strength with mindfulness — creative, steady-paced flows where there is space to move, breathe, and connect more deeply with the body. Nyisha is also a health coach, passionate about supporting others in their healing journeys.
