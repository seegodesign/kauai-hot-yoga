name: Harper Ness
title: Instructor
bio: Harper Ness believes yoga should be accessible to every body and designs her classes to suit all levels. An integral part of her style is incorporating new shapes by taking traditional poses and adding creative variations. Her 400 hours of teacher training took place in Rishikesh, India and her hometown of Salt Lake City, Utah. Initially drawn to yoga for its foundation in movement, she connected deeply to the practice upon discovering the philosophy woven throughout it. Harper is driven by personal connection and spreading kindness and acceptance to all she encounters.
