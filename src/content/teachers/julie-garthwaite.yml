name: Julie Garthwaite
title: Instructor
bio: Julie was introduced to yoga after seeking rehabilitation for a broken leg in her early twenties — a decision that changed her life entirely, not just physically but mentally and emotionally. She earned her 200 RYTc in 2018 from Seasons Holistic Arts while studying Philosophy and Holistic Wellness at Ohio University, and her 500 RYTc in November 2022 from Vikasa Yoga Academy in Koh Samui, Thailand. She continues to train with teachers from around the world in physical practice, philosophy, meditation, and breathwork. Julie believes that connection to self and creative flow are two of the most important human experiences.
