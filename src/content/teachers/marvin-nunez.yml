name: Marvin Nunez
title: Instructor
bio: Marvin has been practicing Bikram Yoga since the summer of 2003. He began his practice as a way to heal old injuries, but yoga ended up changing his life in ways he couldn't imagine. He became a certified instructor in the spring of 2011 and has been loving and living the yogi lifestyle ever since, teaching full time.
