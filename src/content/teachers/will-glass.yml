name: Will Glass
title: Instructor
bio: Will Glass began his yoga teaching journey in 2007 in Phoenix, Arizona, quickly joining the schedules of top Vinyasa studios including Modern Yoga, Lifepower Yoga, and Montelucia Resort. After visiting Kauai every year for half a decade, he relocated his family to the island in the winter of 2017 and has since taught regularly on the beach at Kauai Shore Hotel. Will teaches a variety of levels and specializes in his signature "Will Power" class — a blend of asana and calisthenics designed to help students lengthen, strengthen, balance, and breathe.
