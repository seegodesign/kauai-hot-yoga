name: Cheyenne Tilford
title: Yoga Sculpt Specialist
bio: Cheyenne has been teaching yoga for over 10 years, having started at age 17. She completed her 200-hour teacher training in Chicago and her yoga sculpt teacher training in Dallas, TX. When she isn't on the mat, Cheyenne teaches elementary school at Kapa'a Elementary on Kauai. Her yoga sculpt classes are a full-body workout incorporating core work, push-ups, squats, cardio, and yoga flows — always fun, empowering, and energetic.
