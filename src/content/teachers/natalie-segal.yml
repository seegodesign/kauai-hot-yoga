name: Natalie Segal
title: Instructor
bio: Natalie started falling in love with yoga around 2015 in West Palm Beach, Florida, and became certified to teach in 2017. For her, yoga creates a presence that nothing else can match — the breathwork woven into movement makes the only thing that matters the current moment. In her classes she keeps a steady, mellow flow infused with creative variations. Every class is different, and she always incorporates movement designed to leave students feeling more flexible and tranquil.
