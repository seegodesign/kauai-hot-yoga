seo_title: About Us | Kauai Hot Yoga — Lihue, Hawaii
seo_description: Learn about Kauai Hot Yoga — our studio, infrared heating, and mission to serve the Kauai community in Lihue, Hawaii.
hero_eyebrow: Kauai Hot Yoga
hero_title: About Us
hero_subtitle: Kauai Hot Yoga is a locally owned and operated yoga studio in Lihue, Kauai. We offer a variety of hot and non-heated yoga classes, workshops, and special events in our beautiful studio, which features a state-of-the-art infrared heating system.
studio_eyebrow: The Space
studio_heading: Our Studio
studio_paragraph: Our beautiful studio offers a spacious yoga room with a state-of-the-art infrared heating system used in all of our hot classes. We offer both heated and non-heated classes, as well as workshops and special events.
studio_features:
  - State-of-the-art infrared heating system
  - Cold plunging available after all hot classes
  - Men's & women's changing rooms with showers
  - Free filtered alkaline (Kangen) water for all students
  - Towel and mat rentals available
  - Yoga boutique on-site
